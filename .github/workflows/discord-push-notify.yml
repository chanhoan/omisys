name: Discord Push Notification

on:
  push:
    branches: ["main"]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord - Push
        run: |
          curl -s -H "Content-Type: application/json" -X POST \
            -d "{\"embeds\":[{\"title\":\"📦 Push to \`${{ github.ref_name }}\`\",\"description\":\"${{ github.event.head_commit.message }}\",\"color\":5793266,\"fields\":[{\"name\":\"작성자\",\"value\":\"${{ github.actor }}\",\"inline\":true},{\"name\":\"커밋\",\"value\":\"\`$(echo '${{ github.sha }}' | cut -c1-7)\`\",\"inline\":true}],\"url\":\"${{ github.event.head_commit.url }}\"}]}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

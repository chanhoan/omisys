name: Search Service CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "common/domain/**"
      - "service/search/server/**"
      - "Dockerfile"
      - "docker-compose.yml"

jobs:
  build-and-deploy-search-service:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Notify Discord - Started
        run: |
          curl -s -H "Content-Type: application/json" -X POST \
            -d "{\"content\":\"🔨 **${{ github.workflow }}** 빌드 시작 (\`${{ github.ref_name }}\`)\"}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build search-service jar
        run: |
          chmod +x gradlew
          ./gradlew :service:search:server:clean :service:search:server:bootJar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/chanhoan/omisys-search-service:latest
          build-args: FILE_DIRECTORY=service/search/server

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.yml
          target: /opt/omisys/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ghcr.io/chanhoan/omisys-search-service:latest
            cd /opt/omisys
            docker compose up -d --force-recreate --no-deps search-service

      - name: Notify Discord - Result
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: ${{ github.workflow }}
